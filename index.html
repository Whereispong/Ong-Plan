<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OFP Brief">
<meta name="theme-color" content="#0B2540">
<title>OFP Briefing</title>
<style>
:root{
 --navy:#0B2540; --navy2:#15375c; --ink:#1b2330; --paper:#f5f7fa;
 --line:#dce3ec; --muted:#6b7785;
 --ok:#2f7d4f; --warn:#b5740a; --crit:#b3261e;
 --okbg:#eaf5ee; --warnbg:#fdf3e1; --critbg:#fbeae8; --infobg:#eef3f8;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);
 font:17px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
 padding-bottom:env(safe-area-inset-bottom)}

/* ---- landing / dropzone ---- */
#land{min-height:100vh;display:flex;flex-direction:column;align-items:center;
 justify-content:center;padding:32px;text-align:center;
 padding-top:calc(32px + env(safe-area-inset-top))}
#land h1{color:var(--navy);font-size:30px;margin:0 0 6px;letter-spacing:.5px}
#land p{color:var(--muted);margin:0 0 28px;max-width:420px}
.drop{width:100%;max-width:460px;border:2.5px dashed var(--navy2);border-radius:18px;
 background:#fff;padding:40px 24px;cursor:pointer;transition:.15s}
.drop:active,.drop.hot{background:var(--infobg);border-color:var(--navy)}
.drop .big{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:6px}
.drop .sub{font-size:14px;color:var(--muted)}
#file{display:none}
.badge{margin-top:22px;font-size:12px;color:var(--muted)}
.spinner{margin-top:24px;display:none}
.spinner.on{display:block}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--navy2);
 margin:0 3px;animation:b 1s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes b{0%,80%,100%{opacity:.25}40%{opacity:1}}
.err{margin-top:20px;color:var(--crit);font-weight:600;max-width:440px}

/* ---- briefing ---- */
#app{display:none}
.tabs{position:sticky;top:0;z-index:10;display:flex;gap:6px;overflow-x:auto;
 padding:10px 12px;background:var(--navy);
 padding-top:calc(10px + env(safe-area-inset-top));align-items:center}
.tab{flex:0 0 auto;color:#cfe0f0;text-decoration:none;font-weight:700;font-size:15px;
 padding:8px 13px;border-radius:10px;background:rgba(255,255,255,.08);
 display:flex;flex-direction:column;line-height:1.15;border:none;cursor:pointer}
.tab span{font-weight:500;font-size:12px;color:#9fc0e0}
.tab.active{background:#cfe0f0;color:var(--navy)}.tab.active span{color:var(--navy2)}
.newbtn{flex:0 0 auto;margin-left:auto;color:#cfe0f0;background:rgba(255,255,255,.08);
 border:none;border-radius:10px;font-weight:700;font-size:14px;padding:8px 12px;cursor:pointer}
.card{max-width:820px;margin:16px auto;background:#fff;border:1px solid var(--line);
 border-radius:16px;padding:20px 22px;box-shadow:0 1px 3px rgba(11,37,64,.06)}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
 flex-wrap:wrap;border-bottom:2px solid var(--navy);padding-bottom:10px}
.sec-head h2{margin:0;font-size:26px;color:var(--navy);letter-spacing:.5px}
.od{font-size:19px;font-weight:700;color:var(--navy2)}.arrow{margin:0 8px;color:var(--muted)}
.facts{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:16px 0 4px}
@media(max-width:560px){.facts{grid-template-columns:repeat(2,1fr)}}
.fact{background:var(--infobg);border-radius:10px;padding:9px 11px;display:flex;
 flex-direction:column;gap:2px}
.fact .fl{font-size:11px;font-weight:700;letter-spacing:.7px;color:var(--muted)}
.fact .fv{font-size:17px;font-weight:700;color:var(--ink)}
.fact.ok .fv{color:var(--ok)}
.fact.warn{background:var(--warnbg)}.fact.warn .fv{color:var(--warn)}
.fact.crit{background:var(--critbg)}.fact.crit .fv{color:var(--crit)}
h3{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);
 margin:20px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.route{font-family:ui-monospace,Menlo,monospace;font-size:15px;background:#f7f9fc;
 border:1px solid var(--line);border-radius:8px;padding:10px 12px;word-spacing:2px}
.turb{font-weight:600;padding:10px 12px;border-radius:8px;background:var(--infobg)}
.turb.ok{background:var(--okbg);color:var(--ok)}
.turb.warn{background:var(--warnbg);color:var(--warn)}
.turb.crit{background:var(--critbg);color:var(--crit)}
.co{margin:0;padding-left:0;list-style:none}
.co li{padding:8px 0;border-bottom:1px solid var(--line);font-size:15px}
.co b{color:var(--navy2)}.muted{color:var(--muted)}
.apt{margin:14px 0 6px;font-weight:700;font-size:16px;color:var(--ink)}
.role{display:inline-block;background:var(--navy);color:#fff;font-size:12px;font-weight:700;
 padding:2px 8px;border-radius:6px;margin-right:6px;letter-spacing:.5px}
.notams{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.n{border-radius:10px;padding:9px 11px;border-left:5px solid var(--muted);background:var(--infobg)}
.n.info{border-color:#5b7fa6;background:var(--infobg)}
.n.warn{border-color:var(--warn);background:var(--warnbg)}
.n.crit{border-color:var(--crit);background:var(--critbg)}
.tag{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
 color:var(--navy2);margin-right:7px}
.nid{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted)}
.when{float:right;font-size:12px;font-weight:700;color:var(--ink);background:#fff;
 border:1px solid var(--line);border-radius:6px;padding:1px 7px}
.ntext{margin-top:4px;font-size:15px;line-height:1.45}.n.crit .ntext{font-weight:600}
.foot{margin-top:16px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.4}

/* ---- OptiClimb card (standout reference) ---- */
.opti{border:2px solid var(--navy);border-radius:14px;overflow:hidden;margin:6px 0 4px}
.opti-h{background:var(--navy);color:#fff;font-weight:700;letter-spacing:.6px;
 font-size:13px;text-transform:uppercase;padding:8px 14px}
.opti-limit{background:var(--critbg);color:var(--crit);font-weight:800;font-size:16px;
 text-align:center;padding:11px 14px;border-bottom:1px solid var(--line);letter-spacing:.2px}
.opti-params{display:flex;flex-wrap:wrap;gap:9px;padding:12px 14px;border-bottom:1px solid var(--line)}
.opti-params>div{flex:1 1 120px;background:var(--infobg);border-radius:9px;padding:8px 11px;
 display:flex;flex-direction:column;gap:2px}
.opti-params span{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted)}
.opti-params b{font-size:18px;color:var(--navy);font-family:ui-monospace,Menlo,monospace}
.opti-steps{width:100%;border-collapse:collapse;font-size:15px}
.opti-steps th{text-align:left;font-weight:600;color:var(--muted);padding:9px 14px;width:48%;
 border-bottom:1px solid var(--line)}
.opti-steps td{font-family:ui-monospace,Menlo,monospace;font-weight:700;color:var(--ink);
 padding:9px 14px;border-bottom:1px solid var(--line)}
.opti-steps tr:last-child th,.opti-steps tr:last-child td{border-bottom:none}
.opti-note{font-size:12.5px;color:var(--muted);padding:9px 14px;background:#f7f9fc;line-height:1.45}
.savebtn{background:#cfe0f0;color:var(--navy)}

/* ---- SIGWX weather tab ---- */
.wx-threats{display:flex;flex-direction:column;gap:8px;margin:6px 0 2px}
.wx-th{display:flex;gap:10px;align-items:flex-start;border-radius:10px;padding:10px 12px;
 border-left:5px solid var(--muted);background:var(--infobg)}
.wx-th.crit{border-color:var(--crit);background:var(--critbg)}
.wx-th.warn{border-color:var(--warn);background:var(--warnbg)}
.wx-th.ok{border-color:var(--ok);background:var(--okbg)}
.wx-th .ic{font-family:ui-monospace,Menlo,monospace;font-weight:800;font-size:11px;
 letter-spacing:.5px;background:#fff;border:1px solid var(--line);border-radius:6px;
 padding:3px 7px;color:var(--navy2);white-space:nowrap;margin-top:1px}
.wx-th.crit .ic{color:var(--crit);border-color:var(--crit)}
.wx-th.warn .ic{color:var(--warn);border-color:var(--warn)}
.wx-th .tx b{display:block;font-size:15px;color:var(--ink)}
.wx-th .tx span{font-size:13px;color:var(--muted);line-height:1.4}
.wx-th.crit .tx b{color:var(--crit)}.wx-th.warn .tx b{color:var(--warn)}
.wx-imgwrap{margin-top:6px}
.wx-img{width:100%;border:1px solid var(--line);border-radius:10px;display:block;cursor:zoom-in}
.wx-cap{font-size:12px;color:var(--muted);margin:5px 0 14px;text-align:center}
.lb{position:fixed;inset:0;background:rgba(7,18,32,.93);z-index:50;display:none;
 overflow:auto;padding:10px;-webkit-overflow-scrolling:touch}
.lb.on{display:block}
.lb img{display:block;margin:0 auto;max-width:none}
.lb .x{position:fixed;top:calc(10px + env(safe-area-inset-top));right:14px;z-index:51;
 background:#fff;color:var(--navy);border:none;border-radius:50%;width:42px;height:42px;
 font-size:24px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
@media print{.lb{display:none !important}}

/* ---- Defects (MR2 / ADD) tab ---- */
.def-note{font-size:12.5px;color:var(--muted);background:var(--warnbg);border:1px solid var(--line);
 border-radius:9px;padding:9px 11px;line-height:1.45;margin:4px 0 10px}
.def-in{width:100%;min-height:120px;box-sizing:border-box;border:1px solid var(--line);
 border-radius:9px;padding:10px;font:13px ui-monospace,Menlo,monospace;color:var(--ink);resize:vertical}
.def-actions{display:flex;gap:8px;margin:8px 0 4px}
.def-btn{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--navy);
 border-radius:8px;padding:8px 16px;font-weight:600;font-size:14px;cursor:pointer}
.def-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.def-summary{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:12px 0;
 padding:10px 12px;background:var(--infobg);border-radius:9px;font-size:13px;color:var(--muted)}
.def-summary b{color:var(--ink);font-size:16px}
.def-summary .def-crewn b{color:var(--warn)}
.def-card{border:1px solid var(--line);border-left:5px solid var(--muted);border-radius:11px;
 padding:11px 13px;margin:9px 0;background:#fff}
.def-card.crit{border-left-color:var(--crit)}
.def-card.warn{border-left-color:var(--warn)}
.def-card.ok{border-left-color:var(--ok)}
.def-top{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
.def-n{font-family:ui-monospace,Menlo,monospace;font-weight:700;color:var(--muted);font-size:12px}
.def-pill{font-size:11px;font-weight:700;letter-spacing:.4px;border-radius:5px;padding:2px 7px}
.pill-open{background:var(--critbg);color:var(--crit)}
.pill-ok{background:var(--okbg);color:var(--ok)}
.pill-cat{background:#eef2f7;color:var(--navy);border:1px solid var(--line)}
.pill-crew{background:var(--warnbg);color:var(--warn)}
.def-date{margin-left:auto;font-size:12px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
.def-item{font-size:15px;font-weight:600;color:var(--ink);line-height:1.4}
.def-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.def-meta>div{flex:1 1 140px;background:var(--infobg);border-radius:8px;padding:6px 9px;
 display:flex;flex-direction:column;gap:1px}
.def-meta span{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--muted)}
.def-meta b{font-size:13px;color:var(--ink);font-family:ui-monospace,Menlo,monospace;font-weight:600}
.def-bg{margin-top:9px;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.def-bg-h{background:var(--navy);color:#fff;font-size:11px;font-weight:700;letter-spacing:.6px;
 text-transform:uppercase;padding:5px 11px}

.def-bg-b span{font-size:13px;color:var(--ink);line-height:1.45}
@media print{.def-in,.def-actions{display:none !important}}

/* ---- Aerodrome weather (METAR / TAF) ---- */
.wx-legend{font-size:11px;color:var(--muted);margin:2px 0 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.wx-ap{border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:8px 0;background:#fff}
.wx-ap-h{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:6px}
.wx-role{font-size:10.5px;font-weight:800;letter-spacing:.5px;border-radius:5px;padding:2px 7px;color:#fff}

.wtok{border-radius:4px;padding:0 3px;font-weight:700}
.vis-ok{background:#e3f3e8;color:#1f7a4d}
.vis-1{background:#fbf3cf;color:#8a6d1f}
.vis-2{background:#fde3c4;color:#a85b12}
.vis-3{background:#fbd0b0;color:#b4480c}
.vis-4{background:#f7c2c2;color:#b3261e}
.vis-5{background:#e4443a;color:#fff}
.wx-crit{background:#e4443a;color:#fff}
.wx-warn{background:#fbe3c0;color:#a85b12}
.wx-mild{background:#e7edf3;color:#41566b}
.wx-time{font-size:10.5px;font-weight:800;letter-spacing:.4px;border-radius:5px;padding:2px 7px;
 background:var(--navy);color:#fff;font-family:ui-monospace,Menlo,monospace}
.wtok-t{background:#eef2f7;color:var(--navy);border:1px dashed #b9c6d6;border-radius:4px;padding:0 3px;font-weight:700}

/* ---- print / export as PDF ---- */
@media print{
 @page{size:A4;margin:12mm}
 html,body{background:#fff;color:#000}
 #land,.tabs{display:none !important}
 #app{display:block !important}
 #content{margin:0}
 .card{display:block !important;max-width:none;margin:0;border:none;border-radius:0;
  box-shadow:none;padding:0 0 6px}
 .card + .card{page-break-before:always}
 .opti,.n,.fact{page-break-inside:avoid}
 .facts{grid-template-columns:repeat(5,1fr)}
 .sec-head h2,.od{color:#000}
 .opti-h{background:#0B2540 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
 .opti-limit,.turb,.fact,.n,.route{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

<body>

<div id="land">
  <h1>OFP Briefing</h1>
  <p>Turn a Thai AirAsia flight-plan PDF into an easy-reading briefing. Everything runs on your device — works fully offline.</p>
  <label class="drop" id="drop" for="file">
    <div class="big">Tap to choose a flight-plan PDF</div>
    <div class="sub">or drag a PDF here</div>
  </label>
  <input type="file" id="file" accept="application/pdf,.pdf">
  <div class="spinner" id="spin"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div class="err" id="err"></div>
  <div class="badge">Add to Home Screen for an offline app icon · No data leaves your iPad</div>
  <div class="badge" id="ver" style="margin-top:6px;font-weight:700">build v13 · multi-line route fix</div>
</div>

<div id="app">
  <nav class="tabs" id="tabs"></nav>
  <div id="content"></div>
</div>

<!-- pdf.js is vendored inline-loaded; for offline use it is cached by the service worker -->
<script src="pdfjs/pdf.min.js"></script>
<script>
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "pdfjs/pdf.worker.min.js";
}

/* ============================================================
   PDF -> layout-preserved lines (mimics pdftotext -layout enough)
   ============================================================ */
async function pdfToText(arrayBuf){
  const pdf = await pdfjsLib.getDocument({data:arrayBuf}).promise;
  const pages = []; const wxPages = [];
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const vp = page.getViewport({scale:1});
    const tc = await page.getTextContent();
    // group items into rows by y, then sort by x, join with spaces scaled to x-gap
    const rows = {};
    tc.items.forEach(it=>{
      const x = it.transform[4], y = Math.round(it.transform[5]);
      // bucket y to nearest 2px to merge same-line fragments
      const key = Math.round(y/2)*2;
      (rows[key] = rows[key] || []).push({x, s: it.str});
    });
    const ys = Object.keys(rows).map(Number).sort((a,b)=>b-a); // top->bottom
    const lines = ys.map(y=>{
      const items = rows[y].sort((a,b)=>a.x-b.x);
      let line = "", lastEnd = null;
      items.forEach(it=>{
        if(lastEnd!==null){
          const gap = it.x - lastEnd;
          if(gap > 3){ line += " ".repeat(Math.min(40, Math.max(1, Math.round(gap/5)))); }
        }
        line += it.s;
        lastEnd = it.x + it.s.length*5; // rough advance
      });
      return line;
    });
    pages.push(lines.join("\n"));
    const ptext = lines.join("\n");
    const sig = /PROGNOSTIC CHART|WAFC|TURBULENCE \(CAT|\bPGG\w\d{2}/i.test(ptext);
    const landscape = vp.width > vp.height * 1.2;   // WAFC SIGWX chart is the only landscape page
    if(sig || landscape) wxPages.push(p);
  }
  return { text: pages.join("\n"), pages, pdf, wxPages };
}

/* render a PDF page to a PNG data-URL (used for the SIGWX chart) */
async function renderWxImage(pdf, p){
  const page = await pdf.getPage(p);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  return canvas.toDataURL("image/png");
}

/* read the threats that are present as text on the SIGWX chart */
function parseWx(txt){
  const flat = txt.replace(/\s+/g," ");
  const o = { issue:null, valid:null, area:null, chart:null, cbTops:[], cbCount:0, turb:false, volc:[] };
  let m;
  if(m=flat.match(/ISSUE TIME:\s*(\d{2}\s*UTC\s+ON\s+\d{1,2}\s+\w{3}\s+\d{4})/i)) o.issue=m[1];
  if(m=flat.match(/VALID(?:\s+AT)?\s+(\d{2}\s*UTC\s+ON\s+\d{1,2}\s+\w{3}\s+\d{4})/i)) o.valid=m[1];
  if(m=flat.match(/ICAO AREA\s+([A-Z])\b/i)) o.area=m[1];
  if(m=flat.match(/\b(PGG\w\d{2}\s+\w{4}\s+\d{6})/)) o.chart=m[1];
  const toks = flat.split(" ");
  for(let i=0;i<toks.length;i++){
    if(toks[i]==="CB"){
      let found=null;
      for(let j=i+1;j<Math.min(i+4,toks.length);j++){ const n=+toks[j]; if(n>=250&&n<=600){ found=n; break; } }
      if(found){ o.cbCount++; o.cbTops.push(found); }
    }
  }
  o.cbTops=[...new Set(o.cbTops)].sort((a,b)=>b-a);
  o.turb=/TURBULENCE \(CAT/i.test(flat);
  const vol=[...flat.matchAll(/\b([A-Z]{3,})\s+(\d{1,2}\.\d)\s*([NS])\s+(\d{2,3}\.\d)\s*([EW])/g)];
  const skip=new Set(["XXX","OCNL","UTC","FEB","JAN","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"]);
  o.volc=vol.filter(x=>!skip.has(x[1])).map(x=>({name:x[1],lat:x[2]+x[3],lon:x[4]+x[5]}));
  return o;
}

/* ============================================================
   Parser  (ported from ofp_brief.py)
   ============================================================ */
const EDR_LIGHT=0.10, EDR_MOD=0.20, EDR_SEV=0.45;
function edrBand(v){
  if(v<EDR_LIGHT) return ["NIL / LIGHT","ok"];
  if(v<EDR_MOD)   return ["LIGHT-MOD","ok"];
  if(v<EDR_SEV)   return ["MODERATE","warn"];
  return ["SEVERE","crit"];
}
const ABBR={
 "U/S":"unserviceable","CLSD":"closed","WIP":"work in progress","THR":"threshold",
 "RCL":"runway centreline","EXTD":"extended","OBST":"obstacle","HGT":"height",
 "LGT":"lights","ACFT":"aircraft","ADZ":"advised","CTN":"caution","BTN":"between",
 "BFR":"before","DIST":"distance","PSN":"position","MNM":"minimum","BLW":"below",
 "OPR":"operating","DLY":"daily","PERM":"permanent","TEMPO":"temporary","ACT":"active",
 "FLTCK":"flight check","DLA":"delayed","DURG":"during","FRNG":"firing","EXER":"exercise",
 "PJE":"parachute jumping","VDGS":"visual docking guidance system",
 "RVR":"runway visual range","PALS":"precision approach lighting","SALS":"approach lighting",
 "DVOR":"Doppler VOR","AZM":"azimuth","RDL":"radial","GND":"ground","UNL":"unlimited",
 "SFC":"surface","MARKED":"marked","TDZ":"touchdown zone","DOWNGRADED":"downgraded",
 "RESTRICTED":"restricted","AVBL":"available","REVISION":"revision","CONST":"construction",
 "PARL":"parallel"
};
function deabbr(t){ return t.replace(/[A-Z/]{2,}/g, w => ABBR[w]||w); }
function notamSeverity(cat,body){
  const up=(cat+" "+body).toUpperCase();
  if(up.includes("RWY")&&up.includes("CLSD")) return "crit";
  if(up.includes("ILS")&&(up.includes("DO NOT USE")||up.includes("U/S"))) return "crit";
  if(up.includes("CLSD")) return "warn";
  if(up.includes("U/S")||up.includes("DOWNGRADED")||up.includes("RESTRICTED")||up.includes("OBST")) return "warn";
  return "info";
}

const HEADER=/\|(AIQ\d+)\s*\|\s*(\S+)\/(\w{4})\s*-\s*(\S+)\/(\w{4})\s*\|\s*ALTN:(\S+)\/(\w{4})/;
const ROUTE=/^([A-Z]{4})\s+RWY-\S+\s+(.+?)\s+RWY-\S+\s+([A-Z]{4})\s*$/;
const EET=/EET\s*:\s*(\d{2}:\d{2})/;
const STD=/\|\s*STD\s*\|\s*(\d{2}:\d{2})/;
const STA=/\|\s*STA\s*\|\s*(\d{2}:\d{2})/;
const EDR=/\b0\.\d{3}\b/g;
const WPT=/^([A-Z0-9]{2,7})\s+/;
const OPTI=/NO OPTICLIMB SPEEDS/;

function splitSectors(full){
  const sectors=[]; const idx={}; let cur=null;
  full.split("\n").forEach(ln=>{
    const m=ln.match(HEADER);
    if(m){
      const key=m[1]+"|"+m[3]+"|"+m[5];
      if(!(key in idx)){
        const o={callsign:m[1],dep_iata:m[2],dep_icao:m[3],arr_iata:m[4],arr_icao:m[5],
          alt_iata:m[6],alt_icao:m[7],route:null,eet:null,std:null,sta:null,
          edr:[],hotspots:[],company:[],opticlimb:null,opti:null,alts:[],dofDay:null,lines:[]};
        idx[key]=o; sectors.push(o);
      }
      cur=idx[key];
    }
    if(cur) cur.lines.push(ln);
  });
  return sectors;
}
function parseOpti(s,nln){
  let m;
  if(m=nln.match(/FOR PLANNED TOW\s*(\d+)\s*KG\s*\/\s*TOC\s*FL(\d+)/i)){ (s.opti=s.opti||{}).tow=+m[1]; s.opti.tocfl=+m[2]; }
  if(m=nln.match(/DO NOT USE IF TOW\s*>\s*(\d+)\s*KG/i)){ (s.opti=s.opti||{}).maxtow=+m[1]; }
  if(m=nln.match(/VERT REV:\s*IAS\s*(\d+)\s*\/\s*FL(\d+)/i)){ (s.opti=s.opti||{}).vertias=+m[1]; s.opti.vertfl=+m[2]; }
  if(m=nln.match(/\bFL(\d+):\s*IAS\s*(\d+)\s*ON FCU/i)){ (s.opti=s.opti||{}).fcufl=+m[1]; s.opti.fcuias=+m[2]; }
  if(m=nln.match(/\bFL(\d+):\s*SPD\/MACH\s*(M[0-9.]+)/i)){ (s.opti=s.opti||{}).machfl=+m[1]; s.opti.mach=m[2]; }
  if(m=nln.match(/SWITCH TO ECON SPD ABOVE\s*FL(\d+)/i)){ (s.opti=s.opti||{}).econfl=+m[1]; }
}
function parseBody(s){
  let pending=null,inCo=false,buf=[],routePend=null,routeLines=0;
  const norm = x => x.replace(/\s+/g," ");  // collapse pdf.js multi-spaces
  for(const ln of s.lines){
    const nln=norm(ln);
    if(s.route===null){
      const t=nln.trim();
      const done=/\sRWY-\S+\s+[A-Z]{4}$/;   // ends with "RWY-xx ARRICAO"
      if(routePend===null){
        const pm=t.match(/^([A-Z]{4})\s+RWY-\S+(?:\s|$)/);   // starts with "DEP RWY-xx"
        if(pm && pm[1]===s.dep_icao){
          if(done.test(t)) s.route=t;                          // whole route on one line
          else { routePend=t; routeLines=1; }                  // route wraps -> start collecting
        }
      } else {
        if(!t || /\/FL\d{3}[\[\]]/.test(t) || /^(REF|ESAD|PLAN|CORTE|\+|\|)/.test(t) || routeLines>=6){
          routePend=null;   // hit the altitude line / next section -> abort collecting
        } else {
          routePend=(routePend+" "+t).replace(/\s+/g," "); routeLines++;
          if(done.test(routePend)){ s.route=routePend; routePend=null; }
        }
      }
    }
    if(s.eet===null){ const m=ln.match(EET); if(m) s.eet=m[1]; }
    let m=ln.match(STD); if(m) s.std=m[1];
    m=ln.match(STA); if(m) s.sta=m[1];
    if(s.opticlimb===null && OPTI.test(nln)) s.opticlimb="__NONE__";
    parseOpti(s,nln);
    const am=nln.match(/\b([A-Z]{4})\s+[MP]\d{3}\s+\d{3,4}\s+F\d{3}\s+\d{2}\.\d{2}\s+\d{4,5}/);
    if(am && am[1]!==s.dep_icao && am[1]!==s.arr_icao && !s.alts.includes(am[1])) s.alts.push(am[1]);
    if(s.dofDay===null){ const dm=nln.match(/DOF\/(\d{2})\d{4}/); if(dm) s.dofDay=+dm[1]; }
    const wm=ln.trim().match(WPT);
    if(wm && !ln.trim().startsWith("|")){ const c=wm[1]; if(c===c.toUpperCase()||/\d/.test(c)) pending=c; }
    const toks=ln.match(EDR);
    if(toks) toks.forEach(t=>{ const v=parseFloat(t); s.edr.push(v); if(v>=EDR_MOD) s.hotspots.push([pending||"?",v]); });
    if(nln.includes("COMPANY NOTAMS")){ inCo=true; buf=[]; continue; }
    if(inCo){
      if(nln.includes("FLYSMART+ EFB VERSION")){ inCo=false; s.company=cleanCompany(buf); }
      else buf.push(ln.replace(/\s+$/,""));
    }
  }
  if(inCo && buf.length && !s.company.length) s.company=cleanCompany(buf);
  return s;
}
function cleanCompany(buf){
  const items=[]; let title=null,body=[];
  for(const raw of buf){
    const s=raw.trim().replace(/\s+/g," ");  // collapse pdf.js multi-spaces
    if(!s || /^[-=]+$/.test(s)) continue;
    if(s.startsWith("RVSM:")||s.includes("ALTIMETER CROSSCHECK")){
      if(!items.some(x=>x[0]==="RVSM ALTIMETER CROSSCHECK"))
        items.push(["RVSM ALTIMETER CROSSCHECK","Cross-check ALT1 / ALT2 / STBY in RVSM airspace (~hourly)."]);
      continue;
    }
    const isTitle = s.length<=60 && s===s.toUpperCase() && !s.endsWith(".");
    if(isTitle){ if(title) items.push([title,body.join(" ").trim()]); title=s; body=[]; }
    else body.push(s);
  }
  if(title) items.push([title,body.join(" ").trim()]);
  return items.filter(x=>!x[0].includes("AODB") && !x[0].includes("EFB VERSION"));
}

const AD_HDR=/^(DEPARTURE|ARRIVAL|OTHER):\s*(.+)$/;
const ICAO=/^([A-Z]{4})\b/;
function parseNotams(full){
  const lines=full.split("\n"); let start=-1;
  const norm=x=>x.replace(/\s+/g," ");
  for(let i=0;i<lines.length;i++){ if(norm(lines[i]).trim().startsWith("DEPARTURE:")&&i+1<lines.length){start=i;break;} }
  if(start<0) return {};
  const blocks={}; let cur=null,buf=[];
  const flush=()=>{ if(cur&&buf.length){ blocks[cur]=((blocks[cur]||"")+"\n"+buf.join("\n")).trim(); } buf=[]; };
  for(const ln of lines.slice(start)){
    const m=norm(ln).trim().match(AD_HDR);
    if(m){ flush(); const label=m[2].trim();
      if(label.toUpperCase().includes("SEE ABOVE")){ cur=null; continue; }
      const ic=label.match(ICAO); cur=ic?ic[1]:null; continue;
    }
    const mm=norm(ln).trim().match(/^(?:METAR|TAF)\s+(?:AMD\s+|COR\s+)?([A-Z]{4})\b/);
    if(mm) cur=mm[1];
    if(cur) buf.push(ln.replace(/\s+$/,""));
  }
  flush(); return blocks;
}
function compressValid(tok){
  const m=(tok||"").match(/(\d{2})(\w{3})\d{4}-(\d{2})(\w{3})\d{4}/);
  if(!m) return "";
  return m[2]===m[4] ? `${m[1]}-${m[3]} ${m[2]}` : `${m[1]}${m[2]}-${m[3]}${m[4]}`;
}
function relevantNotams(block){
  if(!block) return [];
  const banner=/^\*{3,}\s*(.+?)\s*\*{3,}$/;
  const idre=/^(?:NEW\s+)?-?\s*([A-Z]{4})\s+([A-Z]\d{3,4}\/\d{2})\s+(\S+)/;
  const items=[]; let cat="GEN",cur=null;
  const flush=()=>{
    if(!cur) return;
    const [c,nid,valid,bl]=cur;
    const body=bl.join(" ").replace(/\s+/g," ").trim();
    const up=body.toUpperCase();
    if(up.includes("TRIGGER NOTAM")||up.includes("CHECKLIST")||up.includes("LIST OF VALID")){cur=null;return;}
    items.push([c,nid,compressValid(valid),body.slice(0,180)]); cur=null;
  };
  for(const raw of block.split("\n")){
    const s=raw.trim().replace(/\s+/g," ");  // collapse pdf.js multi-spaces
    if(!s) continue;
    const bm=s.match(banner);
    if(bm){ flush(); cat=bm[1].trim().replace(/\b\w/g,ch=>ch.toUpperCase()); continue; }
    const im=s.match(idre);
    if(im){ flush(); cur=[cat,im[2],im[3],[]]; continue; }
    if(s.startsWith("METAR")||s.startsWith("TAF")){ flush(); continue; }
    if(cur){
      let t=s;
      if(/PAGE\s+\d+\s+OF\s+\d+/.test(t)){ t=t.replace(/(THAI AIR ASIA BRIEF\s*)?PAGE\s+\d+\s+OF\s+\d+/," ").trim(); if(!t) continue; }
      cur[3].push(t);
    }
  }
  flush();
  const seen=new Set(),out=[];
  for(const it of items){ const k=it[0]+"|"+it[3]; if(seen.has(k)) continue; seen.add(k); out.push(it); }
  return out;
}
function m2(s){ const [h,m]=s.split(":").map(Number); return h*60+m; }
function groundTimes(secs){
  for(let i=0;i<secs.length-1;i++){
    const c=secs[i],n=secs[i+1];
    if(c.sta&&n.std){ let d=m2(n.std)-m2(c.sta); if(d<0)d+=1440; c.ground=d; } else c.ground=null;
  }
  if(secs.length) secs[secs.length-1].ground=null;
}
function turbLine(s){
  if(!s.edr.length) return ["No EDR data — cross-check SIGWX charts.","info"];
  const mx=Math.max(...s.edr); const [band,cls]=edrBand(mx);
  if(s.hotspots.length){
    const hs=[...s.hotspots].sort((a,b)=>b[1]-a[1]).slice(0,4).map(([w,v])=>`${w} ${v.toFixed(2)}`).join(", ");
    return [`Peak EDR ${mx.toFixed(2)} — ${band}. Watch: ${hs}.`,cls];
  }
  return [`Peak EDR ${mx.toFixed(2)} — ${band}. Generally smooth.`,cls];
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function wxCardHTML(wx){
  const d=wx.data;
  let h='<header class="sec-head"><h2>SIGWX</h2><div class="od">Significant Weather'+
    (d.area?` · ICAO Area ${esc(d.area)}`:"")+'</div></header>';
  const cbTopFL=d.cbTops[0]||0;
  const facts=[
    ["VALID", d.valid||"—", "ok"],
    ["ISSUED", d.issue||"—", "ok"],
    ["CHART", d.chart||"WAFC London", "ok"],
    ["MAX CB", cbTopFL?("FL"+cbTopFL):"—", cbTopFL>=350?"crit":(cbTopFL?"warn":"ok")]
  ];
  h+='<div class="facts">'+facts.map(f=>`<div class="fact ${f[2]}"><span class="fl">${f[0]}</span><span class="fv">${esc(f[1])}</span></div>`).join("")+'</div>';

  h+='<h3>Weather threats</h3><div class="wx-threats">';
  const noText = !d.cbCount && !d.turb && !d.volc.length && !d.valid && !d.chart && !d.area;
  if(noText){
    h+=`<div class="wx-th warn"><span class="ic">READ</span><span class="tx"><b>Threat labels are part of the chart image</b><span>This SIGWX page has no machine-readable text, so the summary can't be auto-built. Tap the chart below to zoom and read CB tops, turbulence FL bands and any VA symbols directly.</span></span></div>`;
  }
  if(d.cbCount){
    const sev=cbTopFL>=350?"crit":"warn";
    const more=d.cbTops.length>1?` · also FL${d.cbTops.slice(1).join(", FL")}`:"";
    const note=cbTopFL>=350
      ? "Tops reach cruise levels — expect embedded build-ups; check the chart for clear deviation room."
      : "Read CB positions and bases visually from the chart.";
    h+=`<div class="wx-th ${sev}"><span class="ic">CB</span><span class="tx"><b>Occasional CB — tops to FL${cbTopFL}</b><span>Implies TS, hail, moderate-to-severe turbulence &amp; icing.${more?` Tops depicted:${esc(more.replace(' · also',''))}.`:""} ${note}</span></span></div>`;
  }
  if(d.turb){
    h+=`<div class="wx-th warn"><span class="ic">TURB</span><span class="tx"><b>CAT / orographic turbulence areas depicted</b><span>Numbered areas carry FL tops/bases — read the band for each from the chart legend.</span></span></div>`;
  }
  if(d.volc.length){
    const vl=d.volc.map(v=>`${esc(v.name)} (${esc(v.lat)} ${esc(v.lon)})`).join(", ");
    h+=`<div class="wx-th warn"><span class="ic">VA</span><span class="tx"><b>Volcanic activity</b><span>${vl}. Cross-check ASHTAM / VA SIGMET for any on or near track.</span></span></div>`;
  }
  if(!noText) h+=`<div class="wx-th ok"><span class="ic">JET</span><span class="tx"><b>Jetstreams &amp; tropopause depicted</b><span>Core flight levels and winds are on the chart — relevant for ride quality and CAT near the jet cores.</span></span></div>`;
  h+='</div>';

  h+='<h3>Chart</h3><div class="wx-imgwrap">';
  wx.imgs.forEach(src=>{ h+=`<img class="wx-img" src="${src}" alt="SIGWX prognostic chart"><div class="wx-cap">Tap to zoom · pinch to enlarge</div>`; });
  h+='</div>';
  h+='<p class="foot">Fixed-time SIGWX prognostic chart from the OFP. Advisory — cross-check live SIGMET, ASHTAM and radar. The threat list is auto-read from the chart text; exact positions and bases must be read from the chart above.</p>';
  return h;
}
function openLb(src){
  let lb=document.getElementById("lb");
  if(!lb){
    lb=document.createElement("div"); lb.id="lb"; lb.className="lb";
    lb.innerHTML='<button class="x" aria-label="Close">&times;</button><img alt="SIGWX chart">';
    lb.querySelector(".x").onclick=()=>lb.classList.remove("on");
    lb.addEventListener("click",e=>{ if(e.target===lb) lb.classList.remove("on"); });
    document.body.appendChild(lb);
  }
  lb.querySelector("img").src=src; lb.classList.add("on");
}
/* ===== Defects (MR2 / ADD) ===== */
const DEFECT_GLOSSARY=[
 {t:/THRUST REVERSER|BLOCKER DOOR|\bREVERSER\b/i,crew:false,
  title:"Thrust reverser — blocker door / latch",
  text:"The thrust reverser redirects fan airflow forward to aid deceleration after landing; blocker/pivoting doors are held by a primary plus backup latches. A single faulty latch is generally a redundant-retention finding that can be carried while the door stays secured by its remaining latches. Confirm in the tech log / MEL whether any reverser deactivation or stow placard applies for dispatch."},
 {t:/EGPWS|\bGPWS\b|\bTAWS\b|\bTERR\b/i,crew:true,
  title:"EGPWS / TAWS (terrain warning)",
  text:"EGPWS provides terrain and obstacle alerting. A PFR/FWC line of 'NO DATA FROM EGPWS' is a recorded data-bus/BITE message between the FWC and EGPWS and does not by itself mean the system is unserviceable. Confirm EGPWS is operative for flight (no active GPWS/TERR fault); if genuinely inoperative, dispatch is governed by the MEL."},
 {t:/\bISIS\b|STANDBY INSTRUMENT|STBY INSTR/i,crew:false,
  title:"ISIS — Integrated Standby Instrument System",
  text:"ISIS is the electronic standby attitude/altitude/airspeed display. A manual-brightness fault is minor provided the display stays clearly readable across day/night ambient light; the standby instrument itself must remain usable. Check the MEL for any standby-display condition."},
 {t:/GROUND WIRE|BONDING|\bGD\d/i,crew:false,
  title:"Bonding / ground wire",
  text:"Bonding straps and ground wires maintain electrical continuity across structure for static dissipation and lightning protection. Worn straps are typically low operational impact and deferrable pending replacement, with no normal-ops crew action."},

  title:"Automatic 'MINIMUM' callout inoperative",
  text:"The FWC normally generates approach aural callouts such as 'MINIMUM'. With this inhibited (pending the FWC mod / OBRM software), the automatic 'MINIMUM' call will not sound — the pilot must make the minimums call manually. 'NTC ONLY' marks this as crew-notice / informational rather than an MEL item."},
 {t:/DECORATIVE PANEL|\bGALLEY\b|COSMETIC|\bPANEL\b|\bTRIM\b/i,crew:false,
  title:"Cabin cosmetic / decorative panel",
  text:"Decorative galley/cabin panels are cosmetic trim. A missing sealed panel is normally a low-impact cabin defect unless it exposes structure or wiring, or creates a sharp edge / FOD source. Handle per cabin / CDL company procedure."},
 {t:/\bFWC\d?\b|FLIGHT WARNING|\bPFR\b/i,crew:false,
  title:"FWC / Post-Flight Report",
  text:"The Flight Warning Computer drives ECAM warnings and aural alerts; the PFR is its post-flight fault log. Many PFR lines are maintenance BITE messages rather than active in-flight failures. Cross-check whether the related system actually showed an ECAM/fault in flight."},

  text:"The APU supplies ground/backup electrical power and bleed air. Dispatch with APU limitations is MEL-driven and can affect bleed/start strategy and ETOPS — check the MEL."},

  text:"The IDG/generator supplies AC electrical power for its side. A generation defect is MEL-driven and may affect electrical configuration and load shedding — check the MEL."},
 {t:/WEATHER RADAR|WX RADAR|\bRADOME\b/i,crew:true,
  title:"Weather radar",
  text:"Weather radar supports avoidance of convective weather. If degraded/inoperative, dispatch is MEL-driven and route/weather suitability becomes a greater crew planning factor."}
];
function explainDefect(item){ const hit=[]; for(const g of DEFECT_GLOSSARY){ if(g.t.test(item)){ hit.push(g); if(hit.length>=2) break; } } return hit; }
function parseMR2(text){
  const out={reg:null,items:[]};
  let m=text.match(/Registration:\s*([A-Z0-9\-]+)/i); if(m) out.reg=m[1];
  const re=/DATE:\s*(.*?)\s*CAT:\s*(.*?)\s*Item:\s*([\s\S]*?)\s*MEL:\s*(.*?)\s*Status:\s*(.*?)\s*Expire(?:\s*Date)?:\s*([\s\S]*?)\s*Extension:\s*(.*?)(?=\s*DATE:|\s*$)/gi;
  let r;
  while(r=re.exec(text)){
    out.items.push({date:r[1].trim(),cat:r[2].trim(),item:r[3].replace(/\s+/g," ").trim(),
      mel:r[4].trim(),status:r[5].trim(),expire:r[6].replace(/\s+/g," ").trim(),ext:r[7].trim()});
  }
  return out;
}
function defMeta(k,v){ if(!v||v==="-") v="—"; return `<div><span>${k}</span><b>${esc(v)}</b></div>`; }
function defectItemHTML(it,n){
  const ntc=/NTC/i.test(it.cat)||/NTC/i.test(it.mel);
  const closed=/clos/i.test(it.status);
  const cls=closed?"ok":(ntc?"warn":"crit");
  const ex=explainDefect(it.item);
  const crew=ex.some(e=>e.crew);
  let h=`<div class="def-card ${cls}"><div class="def-top"><span class="def-n">#${n}</span>`+
    `<span class="def-pill ${closed?'pill-ok':'pill-open'}">${esc(it.status||'—')}</span>`+
    (it.cat&&!/^nil$/i.test(it.cat)?`<span class="def-pill pill-cat">${esc(it.cat)}</span>`:"")+
    (crew?`<span class="def-pill pill-crew">CREW</span>`:"")+
    `<span class="def-date">${esc(it.date||'')}</span></div>`;
  h+=`<div class="def-item">${esc(it.item)}</div>`;
  h+=`<div class="def-meta">`+defMeta("MEL",it.mel)+defMeta("Expire",it.expire)+defMeta("Extension",it.ext)+`</div>`;
  if(ex.length){
    h+=`<div class="def-bg"><div class="def-bg-h">Background</div>`;
    ex.forEach(e=>{ h+=`<div class="def-bg-b"><b>${esc(e.title)}</b><span>${esc(e.text)}</span></div>`; });
    h+=`</div>`;
  }
  return h+`</div>`;
}
function defectsResultHTML(data){
  const open=data.items.filter(i=>/open/i.test(i.status)).length;
  const crew=data.items.filter(i=>explainDefect(i.item).some(e=>e.crew)).length;
  let h=`<div class="def-summary"><span><b>${data.items.length}</b> items</span>`+
    (data.reg?`<span>Reg <b>${esc(data.reg)}</b></span>`:"")+
    `<span><b>${open}</b> open</span>`+
    (crew?`<span class="def-crewn"><b>${crew}</b> crew-relevant</span>`:"")+`</div>`;
  data.items.forEach((it,i)=>h+=defectItemHTML(it,i+1));
  return h;
}
function mountDefects(card){
  card.innerHTML=`<header class="sec-head"><h2>DEFECTS</h2><div class="od">Deferred items · ADD / MR2</div></header>`+
    `<div class="def-note">Paste the aircraft's MR2 / ADD summary below and tap Parse. Background notes are general system information for awareness only — not maintenance, MEL/CDL or dispatch authority. Always use the tech log, MEL/CDL and company engineering for airworthiness decisions.</div>`+
    `<textarea id="mr2in" class="def-in" placeholder="Paste MR2 Summary text here (DATE / CAT / Item / MEL / Status / Expire Date / Extension)..."></textarea>`+
    `<div class="def-actions"><button id="mr2parse" class="def-btn primary">Parse</button><button id="mr2clear" class="def-btn">Clear</button></div>`+
    `<div id="mr2out"></div>`;
  const ta=card.querySelector("#mr2in"), out=card.querySelector("#mr2out");
  card.querySelector("#mr2parse").onclick=()=>{
    const data=parseMR2(ta.value);
    out.innerHTML=data.items.length?defectsResultHTML(data)
      :'<p class="muted">No items found. Paste the full MR2 Summary text — each item should include DATE / CAT / Item / MEL / Status / Expire Date / Extension.</p>';
  };
  card.querySelector("#mr2clear").onclick=()=>{ ta.value=""; out.innerHTML=""; };
}
function renderApp(secs,notams,wx,weather){
  const tabs=document.getElementById("tabs");
  const content=document.getElementById("content");
  tabs.innerHTML=""; content.innerHTML="";
  secs.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===0?" active":"");
    b.innerHTML=`${esc(s.callsign)}<span>${esc(s.dep_iata)}→${esc(s.arr_iata)}</span>`;
    b.onclick=()=>{ showSector(i); };
    tabs.appendChild(b);
  });
  let xi=secs.length;
  if(wx){
    const wb=document.createElement("button");
    wb.className="tab";
    wb.innerHTML=`WX<span>SIGWX chart</span>`;
    const wi=xi++; wb.onclick=()=>showSector(wi);
    tabs.appendChild(wb);
  }
  const defIndex=xi++;
  const db=document.createElement("button");
  db.className="tab";
  db.innerHTML=`DEFECTS<span>ADD / MR2</span>`;
  db.onclick=()=>showSector(defIndex);
  tabs.appendChild(db);
  const pb=document.createElement("button");
  pb.className="newbtn savebtn"; pb.textContent="Save PDF";
  pb.onclick=()=>window.print();
  tabs.appendChild(pb);
  const nb=document.createElement("button");
  nb.className="newbtn"; nb.textContent="New PDF";
  nb.onclick=()=>{ document.getElementById("app").style.display="none";
    document.getElementById("land").style.display="flex";
    document.getElementById("file").value=""; };
  tabs.appendChild(nb);

  window._sectors=secs; window._notams=notams;
  secs.forEach((s,i)=>{
    const card=document.createElement("section");
    card.className="card"; card.id="s"+i; card.style.display=i===0?"block":"none";
    card.innerHTML=sectorHTML(s,notams,weather);
    content.appendChild(card);
  });
  let ci=secs.length;
  if(wx){
    const card=document.createElement("section");
    card.className="card"; card.id="s"+(ci++); card.style.display="none";
    card.innerHTML=wxCardHTML(wx);
    content.appendChild(card);
    card.querySelectorAll(".wx-img").forEach(im=>im.onclick=()=>openLb(im.src));
  }
  {
    const card=document.createElement("section");
    card.className="card"; card.id="s"+(ci++); card.style.display="none";
    content.appendChild(card);
    mountDefects(card);
  }
}
function showSector(i){
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",j===i));
  document.querySelectorAll(".card").forEach((c,j)=>c.style.display=j===i?"block":"none");
  window.scrollTo({top:0,behavior:"instant"});
}
function optiCardHTML(o){
  let h='<div class="opti"><div class="opti-h">OptiClimb speeds</div>';
  if(o.maxtow) h+=`<div class="opti-limit">DO NOT USE if TOW &gt; ${o.maxtow.toLocaleString()} kg</div>`;
  const params=[];
  if(o.tow)   params.push(["PLANNED TOW", o.tow.toLocaleString()+" kg"]);
  if(o.tocfl) params.push(["TOC", "FL"+o.tocfl]);
  if(o.econfl)params.push(["ECON ABOVE", "FL"+o.econfl]);
  if(params.length) h+='<div class="opti-params">'+params.map(p=>`<div><span>${p[0]}</span><b>${p[1]}</b></div>`).join("")+'</div>';
  const rows=[];
  if(o.vertfl) rows.push(["Vertical revision", `IAS ${o.vertias} at FL${o.vertfl}`]);
  if(o.fcufl)  rows.push(["Set on FCU", `IAS ${o.fcuias} at FL${o.fcufl}`]);
  if(o.machfl) rows.push(["Change to Mach", `${o.mach} at FL${o.machfl}`]);
  if(rows.length) h+='<table class="opti-steps">'+rows.map(r=>`<tr><th>${r[0]}</th><td>${esc(r[1])}</td></tr>`).join("")+'</table>';
  h+='<div class="opti-note">During level-off use the higher of FMGS ECON or OptiClimb speed. Use OptiClimb on further climb.</div></div>';
  return h;
}
/* ===== Aerodrome weather (METAR / TAF) ===== */
function parseWeather(text){
  const wx={};
  let region=text;
  const start=text.search(/METAR\s+[A-Z]{4}\s+\d{6}Z/);
  if(start>=0){ region=text.slice(start);
    const end=region.search(/NO SIGMET REPORTS FOUND|Fir:\s*[A-Z]{4}|COMPANY NOTAMS/);
    if(end>=0) region=region.slice(0,end); }
  const lines=region.split("\n");
  let cur=null;
  const flush=()=>{ if(cur){ wx[cur.icao]=wx[cur.icao]||{}; wx[cur.icao][cur.type]=cur.txt.replace(/\s+/g," ").trim(); cur=null; } };
  for(const raw of lines){
    const l=raw.trim(); if(!l) continue;
    let m=l.match(/^METAR\s+(?:COR\s+)?([A-Z]{4})\s+(.*)$/);
    if(m){ flush(); cur={icao:m[1],type:"metar",txt:m[2]}; flush(); continue; }
    m=l.match(/^TAF\s+(?:AMD\s+|COR\s+)?([A-Z]{4})\s+(.*)$/);
    if(m){ flush(); cur={icao:m[1],type:"taf",txt:m[2]}; continue; }
    if(cur && cur.type==="taf"){
      if(/^(DEPARTURE|ARRIVAL|OTHER|METAR|TAF|\*{3,}|-{3,}|=+|NEW |PAGE |THAI AIR|Fir:|NO SIGMET)/i.test(l) || /^[A-Z]{4}\s+[A-Z]?\d{3,4}\//.test(l)){ flush(); }
      else { cur.txt+=" "+l; }
    }
  }
  flush(); return wx;
}
function visClass(v){
  if(v>=5000) return "vis-ok";
  if(v>=4000) return "vis-1";
  if(v>=3000) return "vis-2";
  if(v>=2000) return "vis-3";
  if(v>=1000) return "vis-4";
  return "vis-5";
}
function highlightWx(raw, target, label){
  const toks=raw.split(/\s+/);
  // index the change-group periods and their type
  const periods=[]; let lastKw="VALID";
  toks.forEach((tok,i)=>{
    if(/^(TEMPO|BECMG|INTER)$/.test(tok)){ lastKw=tok; return; }
    if(/^PROB\d{2}$/.test(tok)){ lastKw="TEMPO"; return; }
    if(/^FM\d{6}$/.test(tok)){ lastKw="FM"; return; }
    const pm=tok.match(/^(\d{2})(\d{2})\/(\d{2})(\d{2})$/);
    if(pm){ const isVal=periods.length===0;
      periods.push({i, start:(+pm[1])*24+(+pm[2]), end:(+pm[3])*24+(+pm[4]), type:isVal?"VALID":lastKw}); }
  });
  const mark=new Set(); const tol=1;  // hours of operational margin around STD/STA
  if(target!=null){
    let near=false;
    periods.forEach(p=>{ if(p.type!=="VALID" && p.start<target+tol && p.end>target-tol){ mark.add(p.i); near=true; } });
    if(!near){   // no TEMPO/BECMG window around the time -> highlight the governing BECMG/FM
      let gov=null;
      periods.forEach(p=>{ if((p.type==="BECMG"||p.type==="FM") && p.start<=target && (!gov||p.start>gov.start)) gov=p; });
      if(gov) mark.add(gov.i);
    }
  }
  return toks.map((tok,i)=>{
    if(/^(\d{2})(\d{2})\/(\d{2})(\d{2})$/.test(tok)){
      if(mark.has(i)) return `<span class="wtok wtok-now">${tok}</span><span class="now-tag">${esc(label||"NOW")}</span>`;
      return `<span class="wtok wtok-t">${tok}</span>`;
    }
    if(/^\d{4}$/.test(tok)){ const v=+tok; return `<span class="wtok ${v===9999?"vis-ok":visClass(v)}">${tok}</span>`; }
    if(tok==="CAVOK") return `<span class="wtok vis-ok">${tok}</span>`;
    if(/^(FEW|SCT|BKN|OVC)\d{3}(CB|TCU)$/.test(tok)) return `<span class="wtok wx-crit">${tok}</span>`;
    if(/G\d{2}KT$/.test(tok)) return `<span class="wtok wx-warn">${esc(tok)}</span>`;
    if(/^(\+|-|VC)?(MI|PR|BC|DR|BL|SH|TS|FZ)?(DZ|RA|SN|SG|IC|PL|GR|GS|UP|FG|BR|SA|DU|HZ|FU|VA|PY|SQ|PO|FC|DS|SS)+$/.test(tok)){
      let cls="wx-warn";
      if(/TS|GR|GS|FC|SQ|VA|DS|SS/.test(tok) || /^\+/.test(tok)) cls="wx-crit";
      else if(/^(VC)?(BR|HZ|FU|MI|BC|DU|SA)+$/.test(tok)) cls="wx-mild";
      return `<span class="wtok ${cls}">${tok}</span>`;
    }
    return esc(tok);
  }).join(" ");
}
function wxToMin(hhmm){ const m=(hhmm||"").match(/^(\d{1,2}):?(\d{2})/); return m?(+m[1])*60+(+m[2]):null; }
function wxFlags(raw){
  let minV=null, ts=false;
  raw.split(/\s+/).forEach(t=>{
    if(/^\d{4}$/.test(t)){ const v=+t; if(minV===null||v<minV) minV=v; }
    if(t==="CAVOK" && minV===null) minV=9999;
    if(/TS/.test(t)) ts=true;
  });
  return {minV, ts};
}
function sectorWxHTML(sec, wxmap){
  const list=[]; const seen=new Set();
  const add=(icao,role,iata)=>{ if(icao && !seen.has(icao)){ seen.add(icao); list.push({icao,role,iata}); } };
  add(sec.dep_icao,"DEP",sec.dep_iata);
  add(sec.arr_icao,"DEST",sec.arr_iata);
  add(sec.alt_icao,"ALTN",sec.alt_iata);
  (sec.alts||[]).forEach(a=>add(a,"ALTN",null));
  const stdMin=wxToMin(sec.std), staMin=wxToMin(sec.sta), dof=sec.dofDay;
  let body=""; let any=false;
  list.forEach(ap=>{
    const w=wxmap[ap.icao]; if(!w) return; any=true;
    const src=((w.metar||"")+" "+(w.taf||""));
    const fl=wxFlags(src);
    let target=null, timeChip="", tlabel="";
    const staTarget=()=>{ const d=(dof!=null)?dof+((stdMin!=null&&staMin<stdMin)?1:0):null; return d!=null?d*24+staMin/60:null; };
    if(ap.role==="DEP" && stdMin!=null){ if(dof!=null) target=dof*24+stdMin/60; timeChip=`<span class="wx-time">STD ${esc(sec.std)}Z</span>`; tlabel="STD"; }
    else if(ap.role==="DEST" && staMin!=null){ target=staTarget(); timeChip=`<span class="wx-time">STA ${esc(sec.sta)}Z</span>`; tlabel="STA"; }
    else if(ap.role==="ALTN" && staMin!=null){ target=staTarget(); timeChip=`<span class="wx-time">≈STA ${esc(sec.sta)}Z</span>`; tlabel="STA"; }
    body+=`<div class="wx-ap"><div class="wx-ap-h"><span class="wx-role ${ap.role.toLowerCase()}">${ap.role}</span>`+
      `<span class="wx-icao">${esc(ap.icao)}${ap.iata?" / "+esc(ap.iata):""}</span>`+timeChip+
      (fl.minV!==null?`<span class="wx-chip ${visClass(fl.minV)}">VIS ${fl.minV>=9999?"≥10km":fl.minV}</span>`:"")+
      (fl.ts?`<span class="wx-chip wx-crit">TS</span>`:"")+`</div>`;
    if(w.metar) body+=`<div class="wx-line"><span class="wx-tag">METAR</span><code>${highlightWx(w.metar)}</code></div>`;
    if(w.taf) body+=`<div class="wx-line"><span class="wx-tag">TAF</span><code>${highlightWx(w.taf, target, tlabel)}</code></div>`;
    body+=`</div>`;
  });
  if(!any) return "";
  return `<h3>Aerodrome weather (METAR / TAF)</h3>`+
    `<div class="wx-legend">Vis: <span class="wx-chip vis-ok">≥5000</span><span class="wx-chip vis-1">&lt;5000</span>`+
    `<span class="wx-chip vis-2">&lt;4000</span><span class="wx-chip vis-3">&lt;3000</span>`+
    `<span class="wx-chip vis-4">&lt;2000</span><span class="wx-chip vis-5">&lt;1000</span> · `+
    `<span class="wx-chip wx-crit">TS / CB</span><span class="wx-chip wx-warn">RA / SH / gust</span> · `+
    `<span class="wtok wtok-now">2608/2613</span><span class="now-tag">STA</span> = TEMPO within ~1h of your STD/STA, else the governing BECMG</div>`+body;
}
function sectorHTML(sec,notams,weather){
  const [tline,tcls]=turbLine(sec);
  const gt=sec.ground;
  const gtStr = gt==null?"—":`${gt} min at ${esc(sec.arr_iata)}`;
  const gtCls = gt!=null&&gt<=30?"crit":(gt!=null&&gt<=40?"warn":"ok");
  let h=`<header class="sec-head"><h2>${esc(sec.callsign)}</h2>
    <div class="od">${esc(sec.dep_iata)}/${esc(sec.dep_icao)}<span class="arrow">→</span>${esc(sec.arr_iata)}/${esc(sec.arr_icao)}</div></header>`;
  const facts=[["STD",sec.std||"—","ok"],["EET",sec.eet||"—","ok"],["STA",sec.sta||"—","ok"],
    ["GROUND",gtStr,gtCls],["ALTN",`${esc(sec.alt_iata)}/${esc(sec.alt_icao)}`,"ok"]];
  h+='<div class="facts">'+facts.map(([l,v,c])=>`<div class="fact ${c}"><span class="fl">${l}</span><span class="fv">${v}</span></div>`).join("")+'</div>';
  h+=`<h3>Route</h3><p class="route">${esc(sec.route||"—")}</p>`;
  h+=`<h3>OptiClimb speeds</h3>`;
  if(sec.opti) h+=optiCardHTML(sec.opti);
  else h+='<p class="muted">No OptiClimb speeds published for this sector.</p>';
  h+=`<h3>Turbulence (EDR)</h3><p class="turb ${tcls}">${esc(tline)}</p>`;
  h+=sectorWxHTML(sec, weather||{});
  h+=`<h3>Company NOTAMs</h3>`;
  if(sec.company.length){
    h+='<ul class="co">'+sec.company.map(([t,b])=>`<li><b>${esc(t)}</b>${b?" — "+esc(b):""}</li>`).join("")+'</ul>';
  } else h+='<p class="muted">None.</p>';
  h+=`<h3>Aerodrome NOTAMs — Departure &amp; Arrival</h3>`;
  for(const [role,icao,iata] of [["DEP",sec.dep_icao,sec.dep_iata],["ARR",sec.arr_icao,sec.arr_iata]]){
    h+=`<div class="apt"><span class="role">${role}</span> ${esc(iata)}/${esc(icao)}</div>`;
    const rows=relevantNotams(notams[icao]||"");
    if(!rows.length){ h+='<p class="muted">No operationally significant NOTAMs.</p>'; continue; }
    h+='<ul class="notams">'+rows.slice(0,14).map(([cat,nid,valid,body])=>{
      const sev=notamSeverity(cat,body);
      const vtag=valid?`<span class="when">${esc(valid)}</span>`:"";
      return `<li class="n ${sev}"><span class="tag">${esc(cat)}</span><span class="nid">${esc(nid)}</span>${vtag}<div class="ntext">${esc(deabbr(body))}</div></li>`;
    }).join("")+'</ul>';
  }
  h+='<p class="foot">Auto-generated from OFP. EDR turbulence is advisory — cross-check SIGWX / SIGMET. Permanent AIRAC trigger NOTAMs excluded; verify against full packet.</p>';
  return h;
}

/* ============================================================
   Wiring
   ============================================================ */
const fileInput=document.getElementById("file");
const drop=document.getElementById("drop");
const spin=document.getElementById("spin");
const errEl=document.getElementById("err");

async function handleFile(file){
  errEl.textContent="";
  if(!file){ return; }
  if(!/pdf$/i.test(file.name) && file.type!=="application/pdf"){ errEl.textContent="Please choose a PDF file."; return; }
  spin.classList.add("on");
  try{
    const buf=await file.arrayBuffer();
    const {text,pages,pdf,wxPages}=await pdfToText(buf);
    const secs=splitSectors(text);
    if(!secs.length) throw new Error("No AirAsia sectors found. Is this the right OFP format?");
    secs.forEach(parseBody); groundTimes(secs);
    const notams=parseNotams(text);
    const weather=parseWeather(text);
    let wx=null;
    if(wxPages.length){
      const imgs=[];
      for(const p of wxPages) imgs.push(await renderWxImage(pdf,p));
      wx={ imgs, data: parseWx(wxPages.map(p=>pages[p-1]).join("\n")) };
    }
    renderApp(secs,notams,wx,weather);
    document.getElementById("land").style.display="none";
    document.getElementById("app").style.display="block";
  }catch(e){
    errEl.textContent="Couldn't read that PDF: "+e.message;
  }finally{
    spin.classList.remove("on");
  }
}
fileInput.addEventListener("change",e=>handleFile(e.target.files[0]));
["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
drop.addEventListener("drop",e=>{ if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

/* register service worker for offline */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
